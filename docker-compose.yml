services:
  # ── FastAPI Backend ──
  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    volumes:
      - ./migrations:/app/migrations

  # ── Celery Worker ──
  worker:
    build: .
    command: uv run celery -A src.worker.celery_app worker -Q default,heavy --loglevel=info --concurrency=1 --max-tasks-per-child=1
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G      # Даем до 1 Гигабайта при пиковых нагрузках (Парсинг Excel)
        reservations:
          memory: 256M    # Базовая память

  # ── Celery Beat (планировщик) ──
  beat:
    build: .
    command: uv run celery -A src.worker.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: titan
      POSTGRES_PASSWORD: titan_secret
      POSTGRES_DB: titan_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # ── Redis ──
  redis:
    image: redis:7-alpine
#    ports:
#      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
